name: Publish to PyPI

on:
  release:
    types: [published]

# Trusted publishing (OIDC): no API tokens stored in repo secrets.
# Configure once on PyPI at https://pypi.org/manage/account/publishing/
# (or as a Pending Publisher before the first release).

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify metadata
        run: twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/quanted-agents/
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
