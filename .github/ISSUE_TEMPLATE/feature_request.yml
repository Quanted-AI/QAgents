name: Feature request
description: Suggest a new feature or enhancement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement. Please describe the problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying use case, not the implementation.
      placeholder: "I am trying to build X, but the SDK currently forces me to..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like quanted-agents to support this? A sketch of the API or behavior is helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or considered, and why they didn't fit.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Examples, links to similar features in other libraries, etc.
